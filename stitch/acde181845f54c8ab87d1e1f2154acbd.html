<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris Pause Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-on-surface": "#2c3135",
                      "surface-container": "#1b2024",
                      "inverse-primary": "#006591",
                      "error-container": "#93000a",
                      "surface-container-high": "#252b2f",
                      "tertiary-fixed-dim": "#ffb86e",
                      "on-secondary": "#472a00",
                      "on-primary-container": "#003751",
                      "secondary": "#ffb95f",
                      "on-secondary-fixed-variant": "#653e00",
                      "tertiary-container": "#de8712",
                      "on-primary": "#00344d",
                      "secondary-container": "#ee9800",
                      "on-tertiary-fixed": "#2c1600",
                      "primary-fixed": "#c9e6ff",
                      "on-background": "#dee3e9",
                      "on-primary-fixed-variant": "#004c6e",
                      "on-primary-fixed": "#001e2f",
                      "outline": "#88929b",
                      "on-secondary-fixed": "#2a1700",
                      "inverse-surface": "#dee3e9",
                      "background": "#0f1418",
                      "surface-variant": "#30353a",
                      "surface-bright": "#353a3e",
                      "secondary-fixed": "#ffddb8",
                      "secondary-fixed-dim": "#ffb95f",
                      "on-secondary-container": "#5b3800",
                      "outline-variant": "#3e4850",
                      "on-tertiary-container": "#4d2b00",
                      "surface-tint": "#89ceff",
                      "on-surface": "#dee3e9",
                      "surface-dim": "#0f1418",
                      "primary": "#89ceff",
                      "surface-container-low": "#171c20",
                      "tertiary-fixed": "#ffdcbd",
                      "on-surface-variant": "#bec8d2",
                      "primary-fixed-dim": "#89ceff",
                      "primary-container": "#0ea5e9",
                      "on-error": "#690005",
                      "surface-container-highest": "#30353a",
                      "surface": "#0f1418",
                      "on-tertiary": "#492900",
                      "tertiary": "#ffb86e",
                      "on-error-container": "#ffdad6",
                      "error": "#ffb4ab",
                      "on-tertiary-fixed-variant": "#693c00",
                      "surface-container-lowest": "#0a0f13"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "unit": "4px",
                      "block-gap": "2px",
                      "touch-target": "44px",
                      "panel-padding": "24px",
                      "gutter": "16px"
              },
              "fontFamily": {
                      "label-mono": [
                              "JetBrains Mono"
                      ],
                      "label-lg-bold": [
                              "Hanken Grotesk"
                      ],
                      "body-md": [
                              "Hanken Grotesk"
                      ],
                      "display-xl": [
                              "Hanken Grotesk"
                      ],
                      "headline-lg": [
                              "Hanken Grotesk"
                      ],
                      "headline-sm": [
                              "Hanken Grotesk"
                      ]
              },
              "fontSize": {
                      "label-mono": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "500"
                              }
                      ],
                      "label-lg-bold": [
                              "18px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "700"
                              }
                      ],
                      "body-md": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "display-xl": [
                              "48px",
                              {
                                      "lineHeight": "56px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "800"
                              }
                      ],
                      "headline-lg": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "fontWeight": "700"
                              }
                      ],
                      "headline-sm": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "600"
                              }
                      ]
              }
            },
          },
        }
      </script>
<style>
        .neon-glow-primary {
            box-shadow: 0 0 16px -2px var(--color-primary-container, #0ea5e9);
        }
      </style>
</head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden font-body-md relative select-none">
<!-- Mock Background Game Board (Dimmed & Blurred) -->
<div class="absolute inset-0 z-0 flex items-center justify-center bg-surface-container-lowest overflow-hidden">
<!-- Abstract grid representation -->
<div class="grid grid-cols-10 grid-rows-20 gap-block-gap opacity-20 transform scale-[1.2] blur-[2px]">
<!-- Just some mock blocks to give the illusion of a game -->
<div class="w-8 h-8 bg-surface-variant col-start-4 col-end-5 row-start-15 row-end-16 rounded-sm"></div>
<div class="w-8 h-8 bg-surface-variant col-start-5 col-end-6 row-start-15 row-end-16 rounded-sm"></div>
<div class="w-8 h-8 bg-surface-variant col-start-6 col-end-7 row-start-15 row-end-16 rounded-sm"></div>
<div class="w-8 h-8 bg-surface-variant col-start-5 col-end-6 row-start-14 row-end-15 rounded-sm"></div>
<div class="w-8 h-8 bg-surface-variant col-start-2 col-end-3 row-start-18 row-end-19 rounded-sm"></div>
<div class="w-8 h-8 bg-surface-variant col-start-2 col-end-3 row-start-19 row-end-20 rounded-sm"></div>
<div class="w-8 h-8 bg-surface-variant col-start-3 col-end-4 row-start-19 row-end-20 rounded-sm"></div>
<div class="w-8 h-8 bg-surface-variant col-start-3 col-end-4 row-start-20 row-end-21 rounded-sm"></div>
</div>
<!-- Mock HUD overlay (faint) -->
<div class="absolute left-8 top-1/4 w-32 h-64 border border-outline-variant bg-surface rounded-DEFAULT opacity-30"></div>
<div class="absolute right-8 top-1/4 w-32 h-64 border border-outline-variant bg-surface rounded-DEFAULT opacity-30"></div>
</div>
<!-- The Overlay (The Void Level 0) -->
<div aria-labelledby="pause-title" aria-modal="true" class="absolute inset-0 z-40 bg-background/60 backdrop-blur-md flex items-center justify-center p-gutter" role="dialog">
<!-- Pause Modal Container (Surface Level 1) -->
<div class="w-full max-w-[400px] bg-surface-container border-2 border-outline-variant rounded-lg p-panel-padding flex flex-col items-center gap-8 shadow-2xl relative overflow-hidden">
<!-- Subtle accent lines mimicking scanlines or tech borders -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-50"></div>
<!-- Header -->
<div class="text-center w-full flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">pause_circle</span>
<h1 class="font-display-xl text-display-xl text-primary tracking-tighter uppercase text-center w-full block drop-shadow-[0_0_8px_rgba(137,206,255,0.4)]" id="pause-title">PAUSED</h1>
<p class="font-label-mono text-label-mono text-on-surface-variant uppercase tracking-widest mt-2">Take a breath</p>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-4 mt-4">
<!-- Primary Action: Resume -->
<button aria-label="Resume Game" class="w-full h-[56px] min-h-touch-target bg-primary-container text-on-primary-container rounded-DEFAULT font-label-lg-bold text-label-lg-bold flex items-center justify-center gap-3 transition-transform hover:scale-[1.02] active:scale-95 neon-glow-primary border border-primary-fixed focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    Resume
                </button>
<!-- Secondary Action: Restart -->
<button aria-label="Restart Game" class="w-full h-[56px] min-h-touch-target bg-surface text-on-surface border border-outline-variant hover:bg-surface-variant/50 rounded-DEFAULT font-label-lg-bold text-label-lg-bold flex items-center justify-center gap-3 transition-colors focus:outline-none focus:ring-2 focus:ring-outline focus:ring-offset-2 focus:ring-offset-surface-container">
<span class="material-symbols-outlined">restart_alt</span>
                    Restart
                </button>
<!-- Tertiary Action/Destructive: Quit -->
<button aria-label="Quit to Menu" class="w-full h-[56px] min-h-touch-target bg-surface text-error hover:bg-error-container/20 border border-outline-variant hover:border-error-container/50 rounded-DEFAULT font-label-lg-bold text-label-lg-bold flex items-center justify-center gap-3 transition-colors focus:outline-none focus:ring-2 focus:ring-error focus:ring-offset-2 focus:ring-offset-surface-container">
<span class="material-symbols-outlined">exit_to_app</span>
                    Quit to Menu
                </button>
</div>
<!-- Keyboard Hint (Web/Desktop context) -->
<div class="hidden md:flex w-full items-center justify-center mt-2 opacity-50">
<span class="font-label-mono text-label-mono text-on-surface-variant">Press <kbd class="px-2 py-1 bg-surface border border-outline-variant rounded-sm text-xs font-bold text-on-surface mx-1">ESC</kbd> to resume</span>
</div>
</div>
</div>
</body></html>
