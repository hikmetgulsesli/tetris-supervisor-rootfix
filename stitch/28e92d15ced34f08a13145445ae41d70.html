<style>
        /* Specific glows for game blocks as defined in style guidance */
        .block-glow-i { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4), 0 0 8px rgba(0,255,255,0.4); }
        .block-glow-l { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4), 0 0 8px rgba(255,165,0,0.4); }
        .block-glow-t { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4), 0 0 8px rgba(128,0,128,0.4); }
        .block-ghost { box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3); background-color: rgba(255,255,255,0.05); }
        
        /* Grid setup for 10x20 board */
        .tetris-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(20, 1fr);
            gap: 2px;
            aspect-ratio: 1 / 2;
        }
        
        .mini-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2px;
            aspect-ratio: 1 / 1;
        }

        /* Prevent zooming on double tap for controls */
        .touch-control {
            touch-action: manipulation;
        }
    </style>

<body class="bg-background text-on-background h-screen w-screen overflow-hidden flex flex-col font-body-md text-body-md select-none">

<header class="bg-background dark:bg-background border-b border-outline-variant dark:border-outline-variant flex justify-between items-center w-full px-gutter h-touch-target shrink-0 z-50">

<div class="w-24 h-24 mini-grid">

<div class="col-start-2 row-start-4 w-full h-full bg-tetris-l block-glow-l"></div>
<div class="col-start-3 row-start-4 w-full h-full bg-tetris-l block-glow-l"></div>
</div>
</div>
